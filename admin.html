<script>
// ===== إعدادات GitHub — اسم المستخدم والمستودع والملف ===== //
const OWNER = 'molim-team';
const REPO  = 'molim-team.github.io';
const FILE  = 'data/scholarships.json';

// ===== متغيرات عامة — تخزين البيانات مؤقتاً لتجنب طلبات زائدة ===== //
let editingIndex = -1;       // رقم المنحة اللي يتم تعديلها
let cachedSha = '';           // SHA الملف الحالي — مطلوب لأي تعديل
let cachedScholarships = [];  // نسخة محلية من جميع المنح

// ===== جلب التوكن من الحقل ===== //
function getToken() {
  return document.getElementById('tokenInput').value;
}

// ===== تحويل النص إلى Base64 بدعم UTF-8 (للعربية) ===== //
function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

// ===== فك تشفير محتوى الملف القادم من GitHub ===== //
function decodeContent(content) {
  const clean = content.replace(/\n/g, '');
  const bytes = Uint8Array.from(atob(clean), c => c.charCodeAt(0));
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}

// ===== التبديل بين تبويب الإضافة وتبويب الإدارة ===== //
function showTab(tab) {
  document.getElementById('section-add').style.display = tab === 'add' ? 'block' : 'none';
  document.getElementById('section-manage').style.display = tab === 'manage' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.className = 'tab-btn ' + ((tab === 'add' && i === 0) || (tab === 'manage' && i === 1) ? 'active' : 'inactive');
  });
}

// ===== دوال إدارة صفوف الملفات (إضافة / حذف / قراءة / مسح) ===== //
function addFileRow(containerId, value = '') {
  const container = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'file-row';
  row.innerHTML = `
    <input type="text" placeholder="مثال: جواز السفر، شهادة الميلاد..." value="${value}"/>
    <button class="btn-remove-file" onclick="this.parentElement.remove()">✕</button>
  `;
  container.appendChild(row);
}

function getFileRows(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .file-row input`))
    .map(i => i.value.trim()).filter(Boolean);
}

function clearFileRows(containerId) {
  document.getElementById(containerId).innerHTML = '';
}

function populateFileRows(containerId, items = []) {
  clearFileRows(containerId);
  items.forEach(val => addFileRow(containerId, val));
}

// ===== جلب الملف الحالي من GitHub (يُعيد المحتوى والـ SHA) ===== //
async function getFile() {
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
    headers: { Authorization: `token ${getToken()}` }
  });
  if (!res.ok) throw new Error('فشل الاتصال بـ GitHub — تأكد من التوكن');
  return await res.json();
}

// ===== حفظ الملف المعدّل على GitHub ===== //
async function saveFile(sha, scholarships, message) {
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
    method: 'PUT',
    headers: { Authorization: `token ${getToken()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message,
      content: toBase64(JSON.stringify(scholarships, null, 2)),
      sha: sha
    })
  });

  const result = await res.json();
  console.log('GitHub Response:', result);

  if (!res.ok) {
    throw new Error(result.message || 'فشل الحفظ');
  }

  // تحديث الـ SHA بعد كل حفظ ناجح لتجنب تعارض التعديلات
  if (result.content && result.content.sha) {
    cachedSha = result.content.sha;
  }

  return result;
}

// ===== إضافة منحة جديدة ===== //
async function addScholarship() {
  const msg = document.getElementById('msg');
  msg.style.color = '#1a3a6e';
  msg.textContent = '⏳ جاري الإضافة...';

  const titleVal   = document.getElementById('title').value.trim();
  const countryVal = document.getElementById('country').value.trim();

  if (!titleVal || !countryVal) {
    msg.style.color = 'red';
    msg.textContent = '❌ اسم المنحة والدولة مطلوبان!';
    return;
  }

  // توليد ID فريد من الاسم الإنجليزي أو من الوقت
  const enTitleVal = document.getElementById('enTitle').value.trim();
  const generatedId = enTitleVal
    ? enTitleVal.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '')
    : 'scholarship-' + Date.now();

  // بناء كائن المنحة الجديدة
  const newEntry = {
    id:           generatedId,
    name:         titleVal,
    name_en:      enTitleVal,
    country:      countryVal,
    flag:         document.getElementById('flag').value.trim(),
    degree:       document.getElementById('degree').value.trim(),
    language:     document.getElementById('language').value.trim(),
    description:  document.getElementById('desc').value.trim(),
    benefits:     document.getElementById('benefits').value.split(',').map(s => s.trim()).filter(Boolean),
    requirements: document.getElementById('requirements').value.split(',').map(s => s.trim()).filter(Boolean),
    majors:       document.getElementById('majors').value.split(',').map(s => s.trim()).filter(Boolean),
    open_date:    document.getElementById('open_date').value,
    deadline:     document.getElementById('deadline').value,
      documents: {
      required: getFileRows('required-files-add'),
      optional: getFileRows('optional-files-add'),
      },
    link:         document.getElementById('link').value.trim(),
    open:         document.getElementById('status').value === 'open',
    notes:        document.getElementById('notes').value.trim(),
    };

  try {
    const data = await getFile();
    const current = decodeContent(data.content);
    current.push(newEntry);
    await saveFile(data.sha, current, `إضافة منحة: ${newEntry.name}`);
    msg.style.color = 'green';
    msg.textContent = '✅ تمت إضافة المنحة بنجاح! ستظهر خلال دقائق.';
    // مسح جميع الحقول بعد الإضافة
    ['title','country','degree','language','desc','benefits','requirements','majors','link','flag','enTitle','notes'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('open_date').value = '';
    document.getElementById('deadline').value  = '';
    document.getElementById('status').value    = 'open';
    clearFileRows('required-files-add');
    clearFileRows('optional-files-add');
  } catch(e) {
    msg.style.color = 'red';
    msg.textContent = '❌ حدث خطأ: ' + e.message;
  }
}

// ===== تحميل قائمة المنح الموجودة وعرضها ===== //
async function loadScholarships() {
  const list = document.getElementById('scholarships-list');
  list.innerHTML = '⏳ جاري التحميل...';
  try {
    const data = await getFile();
    cachedSha = data.sha;                            // حفظ SHA للاستخدام عند التعديل والحذف
    cachedScholarships = decodeContent(data.content); // حفظ البيانات محلياً
    list.innerHTML = '';
    if (cachedScholarships.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:#aaa;">لا توجد منح حالياً</p>';
      return;
    }
    cachedScholarships.forEach((s, index) => {
      const flagHtml = s.flag && s.flag.startsWith('http')
        ? `<img src="${s.flag}" style="width:25px; vertical-align:middle; margin-left:5px; border-radius:3px;"/>`
        : (s.flag || '');
      list.innerHTML += `
        <div class="scholarship-item">
          <div>
            <h3>${flagHtml} ${s.name || s.title || ''}</h3>
            <p>${s.country || ''} — ${s.degree || s.degrees || ''}</p>
          </div>
          <div class="item-btns">
            <button class="btn-edit" onclick="openEditModal(${index})">✏️ تعديل</button>
            <button class="btn-delete" onclick="deleteScholarship(${index})">🗑️ حذف</button>
          </div>
        </div>`;
});
  } catch(e) {
    list.innerHTML = '❌ خطأ في التحميل — تأكد من التوكن';
  }
}

// ===== حذف منحة ===== //
async function deleteScholarship(index) {
  if (!confirm('هل أنت متأكد من حذف هذه المنحة؟')) return;
  try {
    // محاولة الحذف من البيانات المخزنة محلياً أولاً
    const title = cachedScholarships[index].name || cachedScholarships[index].title;
    cachedScholarships.splice(index, 1);
    await saveFile(cachedSha, cachedScholarships, `حذف منحة: ${title}`);
    alert('✅ تم الحذف بنجاح!');
    loadScholarships();
  } catch(e) {
    // إذا فشل، جرب الجلب مباشرة من GitHub
    try {
      const data = await getFile();
      const scholarships = decodeContent(data.content);
      const title = scholarships[index].name || scholarships[index].title;
      scholarships.splice(index, 1);
      await saveFile(data.sha, scholarships, `حذف منحة: ${title}`);
      alert('✅ تم الحذف بنجاح!');
      loadScholarships();
    } catch(e2) {
      alert('❌ حدث خطأ: ' + e2.message);
    }
  }
}

// ===== فتح مودال التعديل وتعبئة الحقول ببيانات المنحة ===== //
function openEditModal(index) {
  editingIndex = index;
  document.getElementById('edit-msg').textContent = '';

  if (!cachedScholarships || cachedScholarships.length === 0) {
    alert('⚠️ يرجى تحميل المنح أولاً بالضغط على زر "تحميل المنح"');
    return;
  }

  const s = cachedScholarships[index];

  // تعبئة جميع الحقول ببيانات المنحة المختارة
  document.getElementById('e_title').value        = s.name || s.title || '';
  document.getElementById('e_country').value      = s.country || '';
  document.getElementById('e_degree').value       = s.degree || s.degrees || '';
  document.getElementById('e_language').value     = s.language || '';
  document.getElementById('e_status').value       = (s.open === true || s.status === 'open') ? 'open' : 'closed';
  document.getElementById('e_open_date').value    = s.open_date || '';
  document.getElementById('e_deadline').value     = s.deadline || '';
  document.getElementById('e_desc').value         = s.description || s.desc || '';
  document.getElementById('e_benefits').value     = Array.isArray(s.benefits) ? s.benefits.join(', ') : (s.benefits || '');
  document.getElementById('e_requirements').value = Array.isArray(s.requirements) ? s.requirements.join(', ') : (s.requirements || '');
  document.getElementById('e_majors').value       = Array.isArray(s.majors) ? s.majors.join(', ') : (s.majors || '');
  document.getElementById('e_link').value         = s.link || '';
  document.getElementById('e_flag').value         = s.flag || '';
  document.getElementById('e_enTitle').value      = s.name_en || s.enTitle || '';
  document.getElementById('e_notes').value        = s.notes || '';

  populateFileRows('required-files-edit', s.documents?.required || []);
  populateFileRows('optional-files-edit', s.documents?.optional || []);

  document.getElementById('editModal').classList.add('open');
}

// ===== إغلاق مودال التعديل ===== //
function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editingIndex = -1;
}

// ===== حفظ التعديلات على منحة موجودة ===== //
async function saveEdit() {
  const msg = document.getElementById('edit-msg');
  msg.style.color = '#1a3a6e';
  msg.textContent = '⏳ جاري الحفظ...';

  const updatedTitle   = document.getElementById('e_title').value.trim();
  const updatedCountry = document.getElementById('e_country').value.trim();

  if (!updatedTitle || !updatedCountry) {
    msg.style.color = 'red';
    msg.textContent = '❌ اسم المنحة والدولة مطلوبان!';
    return;
  }

  try {
    const old = cachedScholarships[editingIndex];

    // تحديث بيانات المنحة في النسخة المحلية مع الحفاظ على الحقول القديمة غير المعدّلة
    cachedScholarships[editingIndex] = {
      ...old,
      name:           updatedTitle,
      name_en:        document.getElementById('e_enTitle').value.trim(),
      country:        updatedCountry,
      flag:           document.getElementById('e_flag').value.trim(),
      degree:         document.getElementById('e_degree').value.trim(),
      language:       document.getElementById('e_language').value.trim(),
      description:    document.getElementById('e_desc').value.trim(),
      benefits:       document.getElementById('e_benefits').value.split(',').map(s => s.trim()).filter(Boolean),
      requirements:   document.getElementById('e_requirements').value.split(',').map(s => s.trim()).filter(Boolean),
      majors:         document.getElementById('e_majors').value.split(',').map(s => s.trim()).filter(Boolean),
      open_date:      document.getElementById('e_open_date').value,
      deadline:       document.getElementById('e_deadline').value,
      documents: {
        required: getFileRows('required-files-edit'),
        optional: getFileRows('optional-files-edit'),
      },
      link:           document.getElementById('e_link').value.trim(),
      open:           document.getElementById('e_status').value === 'open',
      notes:          document.getElementById('e_notes').value.trim(),
    };

    await saveFile(cachedSha, cachedScholarships, `تعديل منحة: ${updatedTitle}`);

    msg.style.color = 'green';
    msg.textContent = '✅ تم حفظ التعديلات بنجاح!';

    // إغلاق المودال وإعادة تحميل القائمة بعد ثانية ونصف
    setTimeout(() => {
      closeEditModal();
      loadScholarships();
    }, 1500);

  } catch(e) {
    msg.style.color = 'red';
    msg.textContent = '❌ حدث خطأ: ' + e.message;
    console.error('Save error:', e);
  }
}

// ===== إغلاق المودال عند الضغط خارجه ===== //
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
</script>
